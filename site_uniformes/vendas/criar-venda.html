<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Vendas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../styles.css">
</head>
    <body>
         <header>
            <h1>Registrar vendas</h1>
        </header>

        

            <main class="conteudo">
                <div class="container">
                    <h2>Saída de Produtos</h2>

                    <div class="form-top">
                        <div class="field">
                        <label>Data</label>
                        <input type="date" value="2026-04-28">
                        </div>

                        <div class="field">
                        <label>Código</label>
                        <input type="text">
                        </div>
                    </div>

                    <table>
                        <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Estoque</th>
                            <th>Valor pago</th>
                            <th>Quantidade</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr>
                            <td>
                            <select> 
                                <option>Camisa</option>
                                <option>Regata</option>
                                <option>Camiseta</option>
                                <option>Baby look</option>
                            </select>
                            </td>
                            <td>3</td>
                            <td>
                            <input type="number">
                            </td>
                            <td>
                            <input type="number">
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <div class="actions">
                        <button class="btn-cancel">✖ Cancelar</button>
                        <button class="btn-save">✔ Salvar</button>
                    </div>
                </div>

                <script>
                    document.querySelector(".btn-save").addEventListener("click", function() {

                        let data = document.querySelector('input[type="date"]').value;
                        let codigo = document.querySelectorAll("input[type='text']")[0].value;
                        let produto = document.querySelector("select").value;
                        let valor = document.querySelectorAll("input[type='number']")[0].value;
                        let quantidade = document.querySelectorAll("input[type='number']")[1].value;
                        let estoque = document.querySelector("td:nth-child(2)").innerText;

                        let vendas = JSON.parse(localStorage.getItem("vendas")) || [];

                        let novaVenda = {
                            id: Date.now(),
                            codigo: codigo,
                            produto: produto,
                            estoque: estoque,
                            valor: valor,
                            quantidade: quantidade,
                            data: data
                        };

                        vendas.push(novaVenda);
                        localStorage.setItem("vendas", JSON.stringify(vendas));

                        alert("Venda registrada com sucesso!");
                    });
                </script>

            </main>
            
        </main>

        
    </body>
</html>
